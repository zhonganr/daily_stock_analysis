# Chan Theory Strategy / 缠论
# Based on Zen channel theory: pen, stroke, segment, hub structure analysis.

name: chan_theory
display_name: Chan Theory
description: Based on Chan pen, segment, hub structure, determine trend level, entry/exit points and divergence signals.
category: framework
core_rules: [1, 2, 3, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **Chan Theory (Zen Channel Theory)**

  Core Framework: Fractal → Pen → Segment → Hub → Trend

  ## Analysis Steps

  ### 1. Price Structure Judgment (Hub Identification)
  - Use `get_daily_history` to retrieve 60 days of daily candle data.
  - Identify recent price high-low sequences, determine if currently in
    **Oscillation Hub** (1+ hub) or **Trend Segment** (departing hub upward/downward).
  - Hub: 3 consecutive movements with overlapping price range, oscillating repeatedly within range.
  - Trend: 3+ consecutive hubs moving in same direction.

  ### 2. Divergence Judgment (Highest Priority Signal)
  - **Top Divergence**: Price makes new high but MACD red histogram area shrinks → Sell/reduce signal.
  - **Bottom Divergence**: Price makes new low but MACD green histogram area shrinks → Buy/add signal.
  - Use `analyze_trend` to get MACD data, compare with price highs/lows.

  ### 3. Buy/Sell Point Judgment
  - **First Buy** (Strongest): Last hub in downtrend shows bottom divergence.
  - **Second Buy**: First retracement after leaving downtrend hub doesn't break hub high.
  - **Third Buy**: After hub oscillation, breaks upward (no return to hub interior).
  - **First/Second/Third Sell**: Symmetric structure, opposite direction.
  - Current price's buy/sell point level determines position size.

  ### 4. Level and Position Sizing
  - Daily buy/sell points can use heavier position (30-50%).
  - Weekly buy/sell points can use larger position (50-80%).
  - Multi-level convergence (daily + weekly same direction) signals strongest.

  ### 5. Output Requirements
  - Clearly state current status: Uptrend/Downtrend/Hub Oscillation.
  - Identify any divergence signals and divergence level.
  - Provide current buy/sell point type (first/second/third buy, etc.), or "no clear buy/sell point" if none.
  - Set stop loss at previous lows (when buying) or previous highs (when selling).

  Score Adjustment Suggestions:
  - Bottom divergence + first buy signal: `sentiment_score +15`
  - Second/third buy convergence: `sentiment_score +10`
  - Hub oscillation with no clear direction: `sentiment_score baseline`
  - Top divergence / downward trend: `sentiment_score -15`
