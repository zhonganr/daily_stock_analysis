# Volume Breakout Strategy / 放量突破
# Price breaks above resistance on heavy volume (>2x average).

name: volume_breakout
display_name: Volume Breakout
description: Detect heavy volume breakout above resistance. Applicable when price approaches known resistance.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **Volume Breakout Strategy**

  Breakout Judgment Criteria:

  1. **Resistance Level Identification**:
     - Use `analyze_trend` → resistance_levels to get resistance.
     - Typically 20-day high or previous consolidation platform top.

  2. **Volume Confirmation** (Associated Principle 3: Efficiency First):
     - Daily volume > 5-day average volume × 2.
     - Use `get_realtime_quote` → volume_ratio > 2.0 to confirm.
     - Use `get_daily_history` to calculate average volume for cross-verification.

  3. **Price Confirmation** (Associated Principle 1: Strict Entry Strategy):
     - Close must be above resistance level.
     - Close should be in upper 30% of day's range (strong close).
     - Post-breakout deviation check: still need < 5%, avoid chasing highs.

  4. **Follow-up Verification** (if available):
     - Next day open should be above breakout level, distinguishing true vs. false breakout.

  5. **Risk Filter** (Associated Principle 5: Risk Check):
     - Check with `search_stock_news` for no major bad news.
     - PE should not be too high (avoid bubble-type breakout).

  Score Adjustment:
  - Volume breakout confirmed: sentiment_score +12
  - Breakout with sector convergence (sector also strengthening): additional +5
  - Ideal buy point near breakout level, stop loss 3% below breakout level.
  - Note "volume breakout" in `buy_reason` and `volume_analysis`.
