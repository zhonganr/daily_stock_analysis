name: Daily Stock Analysis

on:
  # Scheduled trigger - every day at 18:00 Beijing time (UTC 10:00)
  schedule:
    - cron: '0 10 * * 1-5'     # Monday to Friday, UTC 10:00 = Beijing time 18:00
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # Full analysis (stocks + market)
          - market-only   # Market review only
          - stocks-only   # Stock analysis only
      force_run:
        description: 'Force run (skip trading day check)'
        required: false
        default: false
        type: boolean

# Concurrency control: Only one analysis task runs at a time
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    # Add timeout limit to prevent task from hanging
    timeout-minutes: 30
    
    steps:
      - name: Random delay (avoid fixed time access)
        run: sleep $((RANDOM % 60))  # Random delay 0-60 seconds before startup
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create necessary directories
        run: |
          mkdir -p data logs reports
      
      - name: Execute stock analysis
        env:
          # ==========================================
          # AI configuration
          # ==========================================
          # Gemini AI (primary)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: '3.0'
          
          # AIHubMix (priority over OPENAI_API_KEY, auto-adapt base_url, recommended for domestic users)
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

          # OpenAI compatible API (backup)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}

          # Anthropic / Claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}

          # ==========================================
          # Data sources
          # ==========================================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          
          # ==========================================
          # Search services
          # ==========================================
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          
          # ==========================================
          # Notification channels (can configure multiple simultaneously, push to all)
          # ==========================================
          
          # Method 1: WeChat Work Webhook
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}
          
          # Method 2: Feishu Webhook
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          
          # Method 3: Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          
          # Method 4: Email
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'daily_stock_analysis Stock Analysis Assistant' }}
          
          # Method 5: Pushover
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          
          # Method 6: PushPlus ⬅️ New!
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          
          # Method 7: Custom Webhook (DingTalk, Bark, self-built services, etc.)
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          
          # Method 8: Discord
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
          
          # Method 9: Feishu Cloud Docs
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}

          # Method 10: AstrBot
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}

          # Method 11: Server Sauce 3
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}

          # ==========================================
          # Stock selection configuration
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'cn' }}
          
          # ==========================================
          # Run configuration ⬅️ New!
          # ==========================================
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || 'en' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          
          # ==========================================
          # System configuration
          # ==========================================
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          # Recommended to disable unstable data sources in GitHub Actions environment
          ENABLE_CHIP_DISTRIBUTION: 'false'
          # Real-time quote data source priority (Tencent has volume ratio and is stable, recommended as first choice)
          # Optional values: tencent, akshare_sina, efinance, akshare_em, tushare
          # If you have a Tushare Pro high-score account, you can put tushare first
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}
          
        run: |
          # Determine run mode
          MODE="${{ github.event.inputs.mode || 'full' }}"
          
          echo "=========================================="
          echo "🚀 China Stock Selection Intelligence Analysis System"
          echo "==========================================="
          echo "⏰ Time: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 Run mode: $MODE"
          echo "📊 Stock selection: $STOCK_LIST"
          echo "📝 Report type: $REPORT_TYPE"
          echo ""
          echo "=========================================="
          echo "📋 Configuration check"
          echo "=========================================="
          echo "【AI Configuration】"
          echo "  Gemini API Key: $([ -n "$GEMINI_API_KEY" ] && echo '✅ Configured' || echo '❌ Not configured')"
          echo "  AIHubMix Key:   $([ -n "$AIHUBMIX_KEY" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  OpenAI API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Anthropic Key:  $([ -n "$ANTHROPIC_API_KEY" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo ""
          echo "【Search Engines】"
          echo "  Bocha API Keys: $([ -n "$BOCHA_API_KEYS" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Tavily API Keys: $([ -n "$TAVILY_API_KEYS" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo ""
          echo "【Notification Channels】"
          echo "  PushPlus: $([ -n "$PUSHPLUS_TOKEN" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  WeChat Work: $([ -n "$WECHAT_WEBHOOK_URL" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Feishu: $([ -n "$FEISHU_WEBHOOK_URL" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Telegram: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Discord: $([ -n "$DISCORD_WEBHOOK_URL" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  AstrBot: $([ -n "$ASTRBOT_URL" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "=========================================="
          echo ""
          
          # Build command line arguments
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ Force run mode enabled (skip trading day check)"
          fi

          # Execute analysis
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
      
      - name: Display run results
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 Analysis complete"
          echo "==========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "Generated reports:"
            ls -la reports/
          else
            echo "⚠️ No report files generated"
          fi
          echo ""
          if [ -f "logs/stock_analysis_$(date +%Y%m%d).log" ]; then
            echo "📜 Recent logs (last 30 lines):"
            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "No logs"
          fi
