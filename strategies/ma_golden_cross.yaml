# MA Golden Cross Strategy / 均线金叉
# MA5 crosses above MA10 (or MA10 above MA20) with volume confirmation.

name: ma_golden_cross
display_name: MA Golden Cross
description: Detect MA golden cross with volume confirmation, classic trend reversal/continuation signal.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **MA Golden Cross Strategy**

  Signal Judgment Criteria:

  1. **Golden Cross Detection** (Associated Principle 2: Trend Trading):
     - Use `analyze_trend` to check MA alignment and MACD status.
     - Primary Signal: MA5 crosses above MA10 within last 3 trading days.
     - Strong Signal: MA10 crosses above MA20 (slower but more reliable).
     - Check if MACD is golden crossing or above zero-line golden cross.

  2. **Volume Confirmation** (Associated Principle 3: Efficiency First):
     - Golden cross day volume should exceed 5-day average volume.
     - Use `get_daily_history` to verify.
     - Golden cross day volume ratio > 1.2 is positive signal.

  3. **Trend Background**:
     - Golden cross after consolidation: Strongest signal.
     - Golden cross during uptrend: Continuation signal.
     - Golden cross during deep decline: Weak signal, needs more confirmation.

  4. **Price Position** (Associated Principle 1: Strict Entry Strategy):
     - Price should be near or above crossing MA.
     - Deviation < 5% — Avoid chasing and delayed entry.

  Score Adjustment:
  - MA5 × MA10 golden cross with volume: sentiment_score +10
  - MA10 × MA20 golden cross: sentiment_score +8
  - MACD zero-line above golden cross: additional +5
  - Note "MA golden cross" in `ma_analysis` and `buy_reason`.
  - Ideal buy point at the crossing MA level.
