# Dragon Head Strategy / 龙头策略
# Identifies sector leaders during sector rotation cycles.

name: dragon_head
display_name: Dragon Head Strategy
description: Identify sector leaders during sector rotation. Applicable when sectors launch or industry catalysts emerge.
category: trend
core_rules: [2, 7]
required_tools:
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news

instructions: |
  **Dragon Head Strategy**

  Evaluation Criteria:

  1. **Sector Leadership Position**:
     - Use `get_sector_rankings` to check if the stock's sector is among recent gains leaders.
     - Confirm whether the stock is the first to rally or hit limit-up during sector launch.

  2. **Turnover Rate and Momentum** (Associated Principle 7: Strong Trend Stock Relaxation):
     - Use `get_realtime_quote` to check turnover rate. Sector leaders typically have > 5% turnover.
     - Volume ratio > 1.5 indicates active trading interest.

  3. **Relative Strength**:
     - Compare individual stock gain/loss versus sector average.
     - True sector leaders on up days should outperform sector by 2%+.

  4. **News Catalysts**:
     - Use `search_stock_news` to search for sector-level catalysts (policy, events, earnings).
     - Sector leader rallies usually accompanied by sector-wide catalysts.

  5. **Deviation Rate Check** (Associated Principle 1: Strict Entry Strategy):
     - Sector leaders can relax deviation to 7%, but exceeding 10% still needs caution.

  Score Adjustment:
  - Confirmed as sector leader: sentiment_score +10
  - Sector currently in active rotation period: additional +5
  - Note "dragon head strategy" judgment result in `buy_reason`.
