# Bottom Volume Surge Strategy / 底部放量
# After extended decline, price stabilizes and volume spikes. Potential reversal.

name: bottom_volume
display_name: Bottom Volume Surge
description: Detect bottom volume spike signals after prolonged decline, indicating potential trend reversal.
category: reversal
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **Bottom Volume Surge Strategy**

  Reversal Judgment Criteria:

  1. **Prolonged Decline Confirmation**:
     - Use `get_daily_history` (30 days).
     - Stock price decline from 20-day high to recent low > 15%.
     - `analyze_trend` → trend_status should be BEAR or STRONG_BEAR.

  2. **Volume Anomaly**:
     - Today's trading volume > 5-day average volume × 3.
     - Use `get_realtime_quote` → volume_ratio > 3.0.
     - This volume spike should appear after a period of extreme shrinking.

  3. **Price Stabilization**:
     - Today's candle closes in the green (close > open).
     - Price holds above recent lows.
     - Preferably shows a long lower shadow, indicating buyer support.

  4. **Confirmation Factors** (Associated Principle 5: Risk Check):
     - Use `search_stock_news` to confirm fundamental catalysts.
     - Chip distribution: average cost approaching current price (cost convergence).

  5. **Risk Warning** (Associated Principle 2: Trend Trading):
     - This is a reversal signal with higher risk than trend following.
     - Position sizing recommended smaller (maximum 2-3%).
     - Stop loss must be strict (below recent lows).

  Score Adjustment:
  - Bottom volume confirmation: sentiment_score +8
  - Combined with bullish candle + news catalyst: additional +5
  - Note "bottom volume surge" in `buy_reason` and `pattern_analysis`.
  - Set stop loss at recent lows.
