# Shrink Volume Pullback Strategy / 缩量回踩
# Volume shrinks during pullback to MA5/MA10, then price bounces.

name: shrink_pullback
display_name: Volume Shrink Pullback
description: Detect volume shrink pullback to MA support, ideal entry for trend continuation.
category: trend
core_rules: [1, 2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **Volume Shrink Pullback Strategy**

  Entry Judgment Criteria:

  1. **Prerequisite** (Associated Principle 2: Trend Trading):
     - Stock must be in uptrend (MA5 > MA10 > MA20).
     - Use `analyze_trend` to confirm bullish alignment.

  2. **Pullback Detection** (Associated Principle 4: Entry Preference):
     - Use `get_daily_history` and `get_realtime_quote`.
     - Price retraces to MA5 (±1% tolerance) or MA10 (±2% tolerance).
     - Pullback period volume < 70% of 5-day average volume (shrinking feature).
     - `analyze_trend` → volume_status should show shrinking.

  3. **Bounce Signal** (Associated Principle 1: Strict Entry Strategy):
     - Current price holds MA support level.
     - MA5 deviation < 2% — Optimal buy zone.

  4. **Confirmation Condition** (Associated Principle 5: Risk Check):
     - `search_stock_news` shows no bad news.
     - Chip distribution healthy (profit ratio 50-80%).

  Score Adjustment:
  - Volume shrink pullback to MA5: sentiment_score +10
  - Volume shrink pullback to MA10 and volume < 0.6× average: sentiment_score +8
  - Ideal buy point at MA5 level, secondary buy point at MA10.
  - Stop loss at MA20 level.
  - Note "volume shrink pullback" in `buy_reason`.
