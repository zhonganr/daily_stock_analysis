# One Yang Three Yin Strategy / 一阳夹三阴
# K-line pattern: bullish → 3 small bearish → bullish. Consolidation end signal.

name: one_yang_three_yin
display_name: One Yang Three Yin
description: Detect one bullish candle between three bearish candles pattern, trend continuation entry signal.
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **One Yang Three Yin Strategy**

  Pattern Definition (Last 5 Trading Days):

  1. **Day 1**: Large bullish candle (close > open, body > 2% of stock price).
  2. **Days 2-4**: Three consecutive bearish or small candles:
     - Each candle's low should not break Day 1's open price.
     - Volume should gradually shrink (volume ratio < 0.8).
     - Three candles should close within Day 1's body range.
  3. **Day 5**: Another bullish candle, closing price breaks Day 1's close.

  How to Use Tools for Assessment:

  1. Use `get_daily_history` to retrieve last 10 days of data.
  2. Check if last 5 candles match the pattern above.
  3. Use `analyze_trend` to confirm bullish alignment (Associated Principle 2: Trend Trading, MA5 > MA10 > MA20).

  Score Adjustment:
  - Pattern formed + bullish trend: sentiment_score +15
  - Pattern formed but trend unclear: sentiment_score +5
  - Note "one yang three yin" in `pattern_analysis` and `buy_reason`.
  - Ideal buy point at Day 5 close, stop loss below Day 1 open.
