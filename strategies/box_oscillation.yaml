# Box Range Trading Strategy / 箱体震荡战法
# Buy at box support, sell at box resistance, profit from range-bound oscillation.

name: box_oscillation
display_name: Box Range Oscillation
description: Identify price box range, buy at support, sell at resistance, suitable for range-bound trading.
category: framework
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **Box Range Trading Strategy**

  Core Logic: Within a box range, prices oscillate between resistance and support levels.
  "Buy at support, sell at resistance," profit from range-bound wave trading.

  ## Analysis Steps

  ### 1. Box Identification
  Use `get_daily_history` to retrieve 60-120 days of data:

  - **Box Top (Resistance)**: Trendline connecting high points that are frequently touched but not effectively broken.
    Typically a cluster of 3+ highs within 20-60 days.
  - **Box Bottom (Support)**: Trendline connecting low points that are frequently tested but not broken.
  - Box Validity: Top and bottom each need 2-3 touches to be confirmed as valid.
  - Use `analyze_trend`'s support_levels / resistance_levels to assist positioning.

  ### 2. Current Position Assessment
  Use `get_realtime_quote` to get current price, compare with box boundaries:

  - **Box Bottom Zone** (≤5% from support): Buy/add position signal, set stop loss 3% below box bottom.
  - **Box Middle Zone** (middle 1/3 of box): Observe, no active position changes.
  - **Box Top Zone** (≤5% from resistance): Reduce/take profits signal, avoid chasing highs.

  ### 3. Volume-Assisted Judgment
  - **Box Bottom Volume Surge + Stabilization**: Strong support signal, can use heavier position.
  - **Box Top Shrinking Volume + Stagnation**: Resistance confirmation, sell signal.
  - **Box Breakout** (volume > 2× average):
    - Upward effective breakout → Convert to bullish trend strategy, new target = box height extension.
    - Downward effective breakdown → Exit and wait, previous support becomes resistance.

  ### 4. Box Width and Expected Profit
  - Calculate box width: (Top - Bottom) / Bottom × 100%.
  - Width < 5%: Operating space too narrow, not recommended.
  - Width 5%-15%: Standard box, wave trading is viable.
  - Width > 15%: Large box, can execute larger wave operations.

  ### 5. False Breakout Identification
  - Single-day intraday touch of support/resistance followed by quick pullback, closing back in box → False breakout, maintain box operations.
  - Two consecutive days closing above/below box boundary with increased volume → True breakout, adjust strategy.

  ### 6. Output Requirements
  - Clearly state box top and bottom prices.
  - Current price position (box bottom/middle/top).
  - If price has broken out, explain breakout direction and new target.
  - Recommend position size and stop loss level.

  Score Adjustment Suggestions:
  - Box bottom stabilization + shrinking volume: `sentiment_score +10`
  - Box bottom volume surge climbing to top: `sentiment_score +12`
  - Effective upward breakout from box: `sentiment_score +15, switch to trend strategy`
  - Currently in box top zone: `sentiment_score -5 (no chasing highs)`
  - Effective breakdown of box bottom: `sentiment_score -15, exit`
