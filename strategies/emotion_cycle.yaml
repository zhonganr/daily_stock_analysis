# Sentiment Cycle Strategy / 情绪周期
# Uses market sentiment, turnover rate and volume pattern to time entries against crowd behavior.

name: emotion_cycle
display_name: Sentiment Cycle
description: Based on market sentiment, turnover rate and volume-price structure, identify sentiment lows (panic bottom) and highs (euphoria peak) for contrarian positioning.
category: framework
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend
  - search_stock_news

instructions: |
  **Sentiment Cycle Strategy**

  Core Philosophy: Market participants' emotions cycle through "panic → despair → doubt → hope → optimism → excitement → greed → frenzy."
  Smart money positions at panic bottoms and exits at frenzy peaks.

  ## Quantified Sentiment Stage Indicators

  ### Step One: Turnover Rate Analysis (Core Sentiment Heat Indicator)
  Use `get_daily_history` and `get_realtime_quote`:

  - **Turnover < 0.5%/day**: Market indifferent, no attention, potential bottom zone (smart money buys others' panic).
  - **Turnover 0.5%-2%**: Normal trading, stable sentiment.
  - **Turnover 2%-5%**: Active, market starting to notice, avoid chasing highs.
  - **Turnover > 5%**: High heat, retail/hot money pouring in, beware sentiment peak.
  - **Turnover > 10% (daily average)**: Extremely overheated, usually short-term top.

  ### Step Two: Consecutive Turnover Trend
  Use `get_daily_history` to calculate 20-day turnover trend:
  - High to low (continuous cooling) + shrinking volume → Sentiment fade, patient waiting.
  - Low to high (accelerating heating) + surging volume → Sentiment ignition, can entry.
  - Sudden single-day massive volume (turnover 5× previous) → Often major distribution, needs caution.

  ### Step Three: News Sentiment Analysis
  Use `search_stock_news` to search recent news, analyze sentiment:
  - News concentrated on "profit realization, better-than-expected earnings, limit-up, institution recommendation" → Sentiment possibly overheated.
  - News concentrated on "earnings decline, bad news, support breakdown" → Pessimism may indicate bottom.
  - Retail forum/social media extremely negative sentiment → Reverse indicator, possibly near bottom.

  ### Step Four: MA Squeeze and Volatility
  Use `analyze_trend`:
  - MA5/MA10/MA20 three-line clustering (MA squeeze) → Consolidation, direction pending, sentiment cold.
  - Volatility at low levels (ATR shrink) → Sentiment extremely depressed, pre-breakout accumulation.

  ## Sentiment Bottom Characteristics (Buy Zone)
  Meet 3+ of the following:
  ✅ 20-day turnover at year-low levels
  ✅ Trading volume continuously shrinking, below 60-day average volume by 50%+
  ✅ Recent news mostly quiet, neutral or negative
  ✅ Stock price near MA20 or below, but without panic plunge
  ✅ Institution holding stable or slightly increasing (if available)

  ## Sentiment Peak Characteristics (Reduce Zone)
  Meet 3+ of the following:
  ⚠️ Last 5-day turnover > 2× of last 20-day average
  ⚠️ Volume pulses explosively (single-day)
  ⚠️ News mostly profit realization, institution target price hike, retail pursuit
  ⚠️ Stock price > 8% deviation from MA5 (high deviation)
  ⚠️ MACD shows top divergence

  ## Output Requirements
  - Current sentiment stage judgment: cold bottom / stable / heating entry / overheating alert / frenzy peak.
  - Current turnover rate vs. year average comparison.
  - Whether sentiment bottom or peak characteristics are met (list satisfied criteria).
  - Provide contrarian operation advice (others panic I'm greedy, others greedy I'm cautious).

  Score Adjustment Suggestions:
  - Sentiment bottom characteristics met 3+: `sentiment_score +14`
  - Sentiment bottom characteristics fully met 5/5: `sentiment_score +20`
  - Sentiment peak characteristics met 3+: `sentiment_score -12`
  - Sentiment peak characteristics fully met 5/5: `sentiment_score -20`
  - Stable sentiment zone: no adjustment to baseline
