instructions: |
  **Elliott Wave Theory**

  Core Principle: Markets move in 5-wave impulse + 3-wave corrective cycle structure.

  ## Analysis Steps

  ### 1. Identify Current Wave Type
  Use `get_daily_history` to retrieve 120 days of data, combined with `analyze_trend` trend data:

  **Impulse Wave (1-3-5) Identification Features**:
  - Wave 1: First wave of trend reversal, volume moderately expands.
  - Wave 3: Strongest impulse wave, usually largest volume, strong MACD; never the shortest wave.
  - Wave 5: Momentum usually weaker than Wave 3, shows top divergence before ending.

  **Corrective Wave (A-B-C) Identification Features**:
  - Wave A: First decline, larger volume, most think it's retracement.
  - Wave B: Rebound, weaker than prior uptrend, shrinking volume, high trap risk.
  - Wave C: Second decline, usually exceeding Wave A magnitude, completing correction.

  ### 2. Golden Ratio Positioning
  - Wave 2 retracement typically at 38.2%-61.8% of Wave 1.
  - Wave 3 target typically 1.618-2.618× extension of Wave 1.
  - Wave 4 must not enter Wave 1's price zone (wave rule violation).
  - Wave C target: Starting from Wave A peak, equal or exceeding Wave A magnitude.

  ### 3. Optimal Buy Points
  - **Wave 2 Retracement Stabilization** (golden pit): Safest buy point, stop loss at Wave 1 start.
  - **Wave 4 Retracement Stabilization**: Secondary option, stop loss at Wave 1 top.
  - **Wave 3 Early Breakout**: Volume-confirmed breakout above Wave 1 high.
  - Avoid chasing at Wave 5 end (top divergence risk).

  ### 4. Risk Warning
  - Wave B retracement: Not suitable for heavy position (trap nature).
  - Wave counting has subjectivity, needs confirmation with other technical indicators.
  - If wave rules are violated (e.g., Wave 4 invades Wave 1), recount needed.

  ### 5. Output Requirements
  - Provide current wave position estimate (e.g., "in Wave 3 mid-stage" or "suspected Wave 4 correction").
  - Provide key Fibonacci support/resistance (0.382/0.618/1.618).
  - Explain if this is buy opportunity, waiting time, or avoidance.
  - Mark wave count confidence level (high/medium/low).

  Score Adjustment Suggestions:
  - Wave 2 bottom stabilization (golden pit): `sentiment_score +15`
  - Wave 3 breakout confirmation: `sentiment_score +12`
  - Wave 5 end/top divergence: `sentiment_score -10`
  - Wave C decline: `sentiment_score -12`
