# Default Bull Trend Strategy / 默认多头趋势

name: bull_trend
display_name: Default Bull Trend
description: Default stock analysis priority strategy, identifies bullish alignment, trend continuation and pullback entry opportunities.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **Default Bull Trend Strategy**

  Applicable Scenarios:
  - Default strategy for regular stock analysis.
  - Prioritize finding opportunities with "uptrend + controllable risk + no chasing highs".

  Analysis Framework:

  1. **Trend Confirmation (Highest Priority)**
     - Use `analyze_trend` to judge MA5/MA10/MA20 alignment.
     - MA5 >= MA10 >= MA20 with upward MA20 slope = bullish structure.
     - If price significantly breaks below MA20, reduce bullish weighting.

  2. **Position and Rhythm**
     - Prefer "retracement without breakdown" over "chasing at highs".
     - When price distance from MA5/MA10 is too large, suggest waiting for retracement.
     - Volume-confirmed breakout of valid resistance improves win rate.

  3. **Volume-Price Verification**
     - Use `get_daily_history` to check if breakthrough/bounce days show volume expansion.
     - Rising on shrinking volume deserves caution, rising with declining volume signals divergence.

  4. **Trading Advice Output**
     - Output clear "buy/observe/reduce" tendency and trigger conditions.
     - Must provide stop loss reference (e.g., below MA20 or structural lows).
     - If no clear advantage, explicitly write "stand aside," avoiding overtrading.

  Score Adjustment Suggestions:
  - Bullish alignment + good trend strength: `sentiment_score +12`
  - Retracement + stabilization at key MA: `sentiment_score +8`
  - Volume-confirmed breakout of key resistance: `sentiment_score +10`
  - Break below MA20 or weakening trend: `sentiment_score -12`
